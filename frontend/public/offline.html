<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #a0a0b0;
      font-family: ui-monospace, monospace;
    }
    .container { text-align: center; padding: 2rem; }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 1.5rem;
      border-radius: 16px;
      background: rgba(77, 184, 255, 0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: bold; color: #4db8ff;
    }
    h1 { color: #fff; font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; line-height: 1.6; max-width: 320px; margin: 0 auto; }
    button {
      margin-top: 1.5rem;
      padding: 0.625rem 1.5rem;
      border: 1px solid rgba(77, 184, 255, 0.3);
      background: rgba(77, 184, 255, 0.1);
      color: #4db8ff;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.875rem;
      cursor: pointer;
    }
    button:hover { background: rgba(77, 184, 255, 0.2); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">J</div>
    <h1>JARVIS Offline</h1>
    <p>No internet connection. JARVIS needs a network connection to fetch live market data and signals.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
